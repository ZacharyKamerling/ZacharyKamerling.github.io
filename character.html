<!DOCTYPE html>
<html>

<head>
    <title>Character Sheet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles.css">
</head>

<body style="margin: 0; padding: 0; overflow: hidden;">
    <div class="character-sheet" style="display: flex; flex-direction: column; height: 100vh;">
        <div style="position: sticky; top: 0; display: flex; align-items: center; justify-content: center; padding: 1em 0; flex-shrink: 0; z-index: 100; background: rgba(0, 0, 0, 0.9); border-bottom: 1px solid #444;">
            <div id="version" style="font-size: 0.75em; opacity: 0.5; position: absolute; left: 0; padding: 0.5em;">
            </div>
            <div id="character-name" style="font-size: 2em; font-weight: 600; text-align: center; flex: 1 1 auto;">
            </div>
            <a href="index.html" title="Return to Character List"
                style="color: #fff; text-decoration: none; font-size: 1.7em; position: absolute; right: 0; padding: 0.2em 0.5em;">
                <span style="vertical-align: middle;">&#8962;</span>
            </a>
        </div>
        <div id="page-container" style="flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden;"></div>
    </div>

    <script type="module" src="./utils/ui.js"></script>
    <script type="module" src="./data/db.js"></script>
    <script type="module" src="./utils/diceRollers.js"></script>
    <script type="module" src="./utils/cardDrawers.js"></script>
    <script type="module" src="./script.js"></script>
    <script type="module" src="./characterSheet.js"></script>
</body>

</html>
